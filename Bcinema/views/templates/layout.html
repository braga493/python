<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cinema{% endblock %} — CineFlask</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d0d;
            color: #e8e8e8;
            min-height: 100vh;
        }

        header {
            background: #1a1a1a;
            border-bottom: 2px solid #e50914;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header h1 { font-size: 1.4rem; color: #e50914; letter-spacing: 1px; }
        header a { color: #e8e8e8; text-decoration: none; font-size: 0.9rem; }
        header a:hover { color: #e50914; }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h1 { font-size: 1.6rem; margin-bottom: 1.2rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.8rem; color: #aaa; }

        .btn {
            display: inline-block;
            background: #e50914;
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #b2070f; }
        .btn-ghost {
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
        }
        .btn-ghost:hover { border-color: #e50914; color: #e50914; background: transparent; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        th {
            text-align: left;
            padding: 0.7rem 1rem;
            background: #1a1a1a;
            color: #aaa;
            font-weight: 600;
            border-bottom: 1px solid #333;
        }
        td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #222;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #161616; }

        .form-grupo {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.3rem;
        }
        input, select {
            width: 100%;
            padding: 0.55rem 0.8rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e8e8e8;
            font-size: 0.95rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #e50914;
        }
        select option { background: #1a1a1a; }

        .card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .flash-lista { list-style: none; margin-bottom: 1rem; }
        .flash-sucesso {
            background: #1a3a1a;
            border-left: 3px solid #4caf50;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .flash-erro {
            background: #3a1a1a;
            border-left: 3px solid #e50914;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-verde { background: #1a3a1a; color: #4caf50; }
        .badge-amarelo { background: #3a3a1a; color: #ffc107; }
        .badge-vermelho { background: #3a1a1a; color: #e50914; }

        .acoes { display: flex; gap: 0.5rem; align-items: center; }
        form.inline { display: inline; }
    </style>
</head>
<body>
    <header>
        <h1>🎬 CineFlask</h1>
        <nav>
            <a href="{{ url_for('cinema.index') }}">Programação</a>
        </nav>
    </header>

    <main>
        {% with msgs = get_flashed_messages(with_categories=true) %}
        {% if msgs %}
        <ul class="flash-lista">
            {% for cat, msg in msgs %}
            <li class="flash-{{ cat }}">{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
