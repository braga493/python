{% extends "layout.html" %}
{% block title %}Nova sessão{% endblock %}

{% block content %}
<h1>🎬 Nova Sessão</h1>

<div class="card" style="max-width:500px;">
    <form method="POST" action="{{ url_for('cinema.cadastrar_sessao') }}">
        <div class="form-grupo">
            <label>Filme</label>
            <select name="filme_id" required>
                <option value="">Selecione o filme...</option>
                {% for filme in filmes %}
                <option value="{{ filme.id }}">
                    {{ filme.titulo }} ({{ filme.duracao_min }} min · {{ filme.classificacao }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-grupo">
            <label>Sala</label>
            <select name="sala_id" required>
                <option value="">Selecione a sala...</option>
                {% for sala in salas %}
                <option value="{{ sala.id }}">
                    Sala {{ sala.numero }} — {{ sala.capacidade }} lugares
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-grupo">
            <label>Data e hora</label>
            <input type="datetime-local" name="data_hora" required>
        </div>

        <div class="form-grupo">
            <label>Preço do ingresso (R$)</label>
            <input type="number" name="preco" step="0.01" min="0" placeholder="Ex: 25.00" required>
        </div>

        <div style="display:flex; gap:0.8rem; margin-top:1.5rem;">
            <button type="submit" class="btn">Salvar sessão</button>
            <a href="{{ url_for('cinema.index') }}" class="btn btn-ghost">← Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
